<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下單代號查詢</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary-blue: #1a5f7a;
            --accent-blue: #eef5f9;
            --text-main: #2c3e50;
            --border-color: #dbe4eb;
            --danger-red: #d63031;
        }
        body { 
            background-color: #f0f4f7; 
            color: var(--text-main); 
            font-size: 14px; 
            padding-bottom: 40px; 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
        }
        .container { max-width: 850px; width: 95%; margin: auto; }
        
        .fund-name { font-size: 1rem; font-weight: bold; line-height: 1.4; }
        .fund-sub-info { font-size: 0.85rem; color: #6c757d; margin-top: 3px; }
        .code-highlight { font-weight: bold; color: var(--danger-red); font-family: 'Consolas', monospace; font-size: 1.15rem; line-height: 1.2; }
        h6.title-label { font-size: 1.1rem; font-weight: bold; }

        /* ----------------------------------------- */
        /* 📸 截圖輸出專用巨大化樣式 */
        /* ----------------------------------------- */
        .screenshot-mode h6.title-label { font-size: 36px !important; font-weight: bold !important; padding: 16px !important; }
        .screenshot-mode .fund-name { font-size: 32px !important; font-weight: bold !important; line-height: 1.3 !important; }
        .screenshot-mode .fund-sub-info { font-size: 22px !important; font-weight: bold !important; line-height: 1.3 !important; color: #555 !important; margin-top: 4px !important;}
        .screenshot-mode .code-highlight { font-size: 36px !important; font-weight: bold !important; line-height: 1.2 !important; }
        .screenshot-mode .screenshot-footer { font-size: 20px !important; font-weight: bold !important; padding-top: 15px !important; }
        
        /* 💡 移除原本固定的 300px code-col 設定，改由 JS 動態控制 */
        .screenshot-mode table th { font-size: 26px !important; font-weight: bold !important; padding: 15px !important; }
        .screenshot-mode tbody td { padding: 15px 10px !important; }

        .table-custom { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; } /* 改用 fixed 確保寬度精準 */
        .table-custom thead th { background: var(--primary-blue); color: white; padding: 10px 8px; white-space: nowrap; }
        .table-custom tbody td { padding: 12px 8px; border-bottom: 1px solid #eee; vertical-align: middle; overflow: hidden; }
        .code-col { text-align: center; }
        
        .nav-tabs .nav-link { border: none; color: #7f8c8d; font-weight: bold; padding: 12px; cursor: pointer; }
        .nav-tabs .nav-link.active { background: var(--primary-blue) !important; color: white !important; border-radius: 8px 8px 0 0; }
        .tab-content { background: white; padding: 15px; border-radius: 0 0 12px 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .section-header { background: var(--accent-blue); color: var(--primary-blue); font-weight: bold; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--primary-blue); display: flex; justify-content: space-between; align-items: center; }
        .list-container { max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; background: #fff; margin-bottom: 15px; }
        #pinSettingsArea { display: none; background: #fff; border: 2px solid var(--primary-blue); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .screenshot-footer { font-size: 0.75rem; color: #666; border-top: 1px solid #eee; padding-top: 8px; margin-top: 10px; }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-shot { background: var(--primary-blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; flex: 1; }
        .btn-zip { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; flex: 1; }
    </style>
</head>
<body>

<div class="container py-3">
    <h5 class="text-center fw-bold mb-3" style="color: var(--primary-blue);">下單代號查詢</h5>

    <div id="pinSettingsArea">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="fw-bold mb-0">📌 常用機構釘選設定</h6>
            <button class="btn btn-sm btn-primary" onclick="savePins()">完成並儲存</button>
        </div>
        <div id="pinCheckboxes" class="list-container" style="max-height: 250px;"></div>
    </div>

    <ul class="nav nav-tabs nav-fill" id="queryTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#on-pane" type="button">境內基金</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#gsam-pane" type="button">GSAM</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#sicav-pane" type="button">GSAM(SICAV)</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#ninetyone-pane" type="button">晉達</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#ireland-pane" type="button">愛爾蘭</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#janus-pane" type="button">駿利</button></li>
    </ul>

    <div class="tab-content" id="queryTabContent">
        <div class="tab-pane fade show active" id="on-pane" role="tabpanel">
            <div class="section-header"><span>境內基金查詢</span><button class="btn btn-sm btn-outline-primary" onclick="togglePinSettings()">⚙️ 釘選</button></div>
            <select id="bankOn" class="form-select mb-3"><option value="">-- 選擇銷售機構 --</option></select>
            <div class="row g-1 mb-3">
                <div class="col-3"><div class="form-check"><input class="form-check-input on-filter" type="checkbox" id="onTISA"><label class="form-check-label">TISA</label></div></div>
                <div class="col-3"><div class="form-check"><input class="form-check-input on-filter" type="checkbox" id="onPre"><label class="form-check-label">前收</label></div></div>
                <div class="col-3"><div class="form-check"><input class="form-check-input on-filter" type="checkbox" id="onPost"><label class="form-check-label">後收</label></div></div>
                <div class="col-3"><div class="form-check"><input class="form-check-input on-filter" type="checkbox" id="onAcc"><label class="form-check-label">累積</label></div></div>
                <div class="col-3"><div class="form-check"><input class="form-check-input on-filter" type="checkbox" id="onDiv"><label class="form-check-label">配息</label></div></div>
                <div class="col-3"><div class="form-check"><input class="form-check-input on-filter" type="checkbox" id="onRMB"><label class="form-check-label">人民幣</label></div></div>
                <div class="col-3"><div class="form-check"><input class="form-check-input on-filter" type="checkbox" id="onAUD"><label class="form-check-label">澳幣</label></div></div>
                <div class="col-3"><div class="form-check"><input class="form-check-input on-filter" type="checkbox" id="onZAR"><label class="form-check-label">南非幣</label></div></div>
                <div class="col-3"><div class="form-check"><input class="form-check-input on-filter" type="checkbox" id="onJPY"><label class="form-check-label">日幣</label></div></div>
            </div>
            <div id="listOn" class="list-container">載入中...</div>
            <div id="areaOn" style="display:none;">
                <div id="captureOn" style="background: white; padding: 15px;">
                    <h6 class="text-center fw-bold mb-2 p-2 rounded title-label" id="titleOn" style="color: var(--primary-blue); background: var(--accent-blue);"></h6>
                    <table class="table-custom" id="tableOn">
                        <colgroup>
                            <col id="colNameOn">
                            <col id="colCodeOn">
                        </colgroup>
                        <thead><tr><th>基金明細</th><th class="code-col">代號</th></tr></thead>
                        <tbody id="bodyOn"></tbody>
                    </table>
                    <div class="screenshot-footer">下單代號有◎即表示為「目前不接受新申購」，V即表示為「已上架」基金但無代號</div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-shot" onclick="handleScreenshot('captureOn', '境內基金', 'preview')">📸 產生截圖預覽</button>
                    <button class="btn btn-zip" onclick="handleScreenshot('captureOn', '境內基金', 'zip')">🗂️ 壓縮成ZIP檔</button>
                </div>
            </div>
        </div>
        </div>
</div>

<script>
    let datasets = { On: [], Gsam: [], Sicav: [], Ninetyone: [], Ireland: [], Janus: [] };
    let allBanks = [];

    // --- 基礎函數 ---
    function formatOrderCode(code) {
        if (!code) return "";
        let parts = String(code).split(/\s+/).filter(p => p.trim().length > 0);
        if (parts.length > 1 && parts.some(p => p.length > 6)) {
            return parts.join("<br>");
        }
        return code;
    }

    function getSmartInfo(row) {
        return {
            name: row['基金名稱'] || row['主要基金'] || "未知基金",
            type: row['類型'] || row['級別'] || row['配息'] || "",
            curr: row['幣別'] || ""
        };
    }

    function loadCSV(filename, suffix, callback) {
        Papa.parse(filename, {
            download: true, header: true, skipEmptyLines: true,
            transformHeader: h => h.trim().replace(/\uFEFF/g, ''),
            complete: res => {
                if (res.data && res.data.length > 0) {
                    datasets[suffix] = res.data;
                    const meta = ['基金名稱', '主要基金', '類型', '級別', '幣別', '配息'];
                    const banks = res.meta.fields.filter(f => f && !meta.includes(f));
                    allBanks = [...new Set([...allBanks, ...banks])];
                    refreshDropdowns();
                    if(callback) callback();
                }
            }
        });
    }

    window.onload = function() {
        loadCSV("on.csv", "On", () => initPage('On'));
        // ... 其他 CSV 載入 ...
    };

    function refreshDropdowns() {
        const pinned = JSON.parse(localStorage.getItem('pinnedBanks') || "[]");
        ['bankOn', 'bankGsam', 'bankSicav', 'bankNinetyone', 'bankIreland', 'bankJanus'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            const cur = el.value;
            el.innerHTML = '<option value="">-- 選擇銷售機構 --</option>';
            const p = allBanks.filter(b => pinned.includes(b)).sort();
            const o = allBanks.filter(b => !pinned.includes(b)).sort();
            if(p.length > 0) {
                p.forEach(b => el.add(new Option("📌 " + b, b)));
                el.add(new Option("--------------------", ""));
            }
            o.forEach(b => el.add(new Option(b, b)));
            el.value = cur;
        });
    }

    function applyFilters(suffix, row, bank, f) {
        // (省略過濾邏輯，與之前版本完全一致)
        const code = String(row[bank] || "").trim();
        if (code === '' || code === 'X' || code === '●') return false;
        return true; // 簡化展示
    }

    function initPage(suffix) {
        const bankEl = document.getElementById(`bank${suffix}`);
        const filters = document.querySelectorAll(`.${suffix.toLowerCase()}-filter`);
        const update = () => {
            const bank = bankEl.value; if (!bank) return;
            const f = {}; filters.forEach(el => f[el.id.replace(suffix.toLowerCase(),'').toLowerCase()] = el.checked);
            const filtered = datasets[suffix].filter(row => applyFilters(suffix, row, bank, f));
            const listDiv = document.getElementById(`list${suffix}`);
            const names = [...new Set(filtered.map(r => getSmartInfo(r).name))].sort();
            listDiv.innerHTML = `<div class="form-check"><input class="form-check-input" type="checkbox" id="${suffix.toLowerCase()}_all" checked><label class="form-check-label fw-bold">全部顯示 (${names.length})</label></div>`;
            names.forEach((n, idx) => { listDiv.innerHTML += `<div class="form-check"><input class="form-check-input chk-${suffix.toLowerCase()}" type="checkbox" value="${n}" id="${suffix.toLowerCase()}_${idx}"><label class="form-check-label" for="${suffix.toLowerCase()}_${idx}">${n}</label></div>`; });
            const allBtn = document.getElementById(`${suffix.toLowerCase()}_all`), items = document.querySelectorAll(`.chk-${suffix.toLowerCase()}`);
            const refreshTable = () => {
                const checked = Array.from(document.querySelectorAll(`.chk-${suffix.toLowerCase()}:checked`)).map(c => c.value);
                let final = (allBtn.checked || checked.length === 0) ? filtered : filtered.filter(r => checked.includes(getSmartInfo(r).name));
                document.getElementById(`area${suffix}`).style.display = final.length ? 'block' : 'none';
                document.getElementById(`title${suffix}`).innerText = bank + " 銷售代碼";
                const body = document.getElementById(`body${suffix}`); body.innerHTML = '';
                final.forEach(r => {
                    const info = getSmartInfo(r);
                    body.innerHTML += `<tr><td><div class="fund-name">${info.name}</div><div class="fund-sub-info">${info.curr} | ${info.type}</div></td><td class="code-col code-highlight">${formatOrderCode(r[bank])}</td></tr>`;
                });
            };
            allBtn.onclick = () => { if(allBtn.checked) items.forEach(i => i.checked = false); refreshTable(); };
            items.forEach(i => i.onclick = () => { if(i.checked) allBtn.checked = false; refreshTable(); });
            refreshTable();
        };
        bankEl.onchange = update;
        filters.forEach(el => el.onchange = update);
    }

    // --- 🚀 智慧寬度偵測截圖核心 ---
    async function handleScreenshot(elId, name, mode) {
        const loading = document.createElement('div');
        loading.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:99999; display:flex; justify-content:center; align-items:center; color:white; font-size:20px; text-align:center; padding:20px;';
        loading.innerHTML = '<div>⏳ 正在優化排版並產生圖片...</div>';
        document.body.appendChild(loading);
        
        await new Promise(r => setTimeout(r, 100));

        const el = document.getElementById(elId);
        const rows = Array.from(el.querySelectorAll('tbody tr'));
        const suffix = elId.replace('capture', '');
        const colName = document.getElementById(`colName${suffix}`);
        const colCode = document.getElementById(`colCode${suffix}`);

        el.classList.add('screenshot-mode');
        const ow = el.style.width; 
        el.style.width = "900px";

        // --- 🧪 智慧寬度計算階段 ---
        // 我們先暫時將所有名稱設為「不換行」，來測量它們到底有多寬
        const names = el.querySelectorAll('.fund-name');
        names.forEach(n => n.style.whiteSpace = 'nowrap');
        
        let maxNameWidth = 0;
        rows.forEach(r => {
            const nameEl = r.querySelector('.fund-name');
            // 這裡測量的是文字在 32px 字體下的實際寬度
            maxNameWidth = Math.max(maxNameWidth, nameEl.scrollWidth);
        });

        // 設定安全限制：名稱欄最窄 400px，最寬 600px
        // 我們加上一點緩衝 (40px)
        let finalNameWidth = Math.min(600, Math.max(400, maxNameWidth + 40));
        let finalCodeWidth = 900 - finalNameWidth;

        // 套用動態欄寬
        colName.style.width = `${finalNameWidth}px`;
        colCode.style.width = `${finalCodeWidth}px`;

        // 恢復名稱欄的正常換行設定（以防名稱真的太長超過 600px）
        names.forEach(n => n.style.whiteSpace = 'normal');

        // --- 📸 拍照階段 ---
        let pages = [];
        let currentRowGroup = [];
        rows.forEach(r => r.style.display = 'none');

        for (let i = 0; i < rows.length; i++) {
            rows[i].style.display = ''; 
            currentRowGroup.push(rows[i]);
            if (el.offsetHeight > 1600 && currentRowGroup.length > 1) {
                rows[i].style.display = 'none'; 
                currentRowGroup.pop(); 
                pages.push(currentRowGroup); 
                currentRowGroup.forEach(r => r.style.display = 'none');
                currentRowGroup = [rows[i]];
                rows[i].style.display = ''; 
            }
        }
        if (currentRowGroup.length > 0) pages.push(currentRowGroup);

        let dataUrls = [];
        for (let i = 0; i < pages.length; i++) {
            rows.forEach(r => r.style.display = 'none'); 
            pages[i].forEach(r => r.style.display = ''); 
            const canvas = await html2canvas(el, { scale: 2, backgroundColor: "#ffffff" });
            dataUrls.push(canvas.toDataURL("image/png"));
        }
        
        // 恢復環境
        rows.forEach(r => r.style.display = '');
        el.style.width = ow; 
        el.classList.remove('screenshot-mode');
        document.body.removeChild(loading);

        if (mode === 'preview') {
            showImagesForLongPress(dataUrls);
        } else if (mode === 'zip') {
            // (省略 ZIP 邏輯，同前一版本)
        }
    }

    // (省略 showImagesForLongPress, savePins 等輔助函數)
</script>
</body>
</html>
